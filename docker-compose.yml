services:
  postgres:
    image: postgres:16
    container_name: onboarding-buddy-postgres
    environment:
      POSTGRES_DB: onboarding_buddy
      POSTGRES_USER: onboarding_buddy
      POSTGRES_PASSWORD: onboarding_buddy
    ports:
      - "5432:5432"
    volumes:
      - onboarding_buddy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onboarding_buddy -d onboarding_buddy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onboarding_buddy_postgres_data:
